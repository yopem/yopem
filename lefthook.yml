pre-commit:
  commands:
    lint:
      run: bun x turbo run lint
    typecheck:
      run: bun x turbo run typecheck
    format:
      run: bun run format:check

pre-push:
  commands:
    lint:
      run: bun x turbo run lint
    typecheck:
      run: bun x turbo run typecheck
    format:
      run: bun run format:check
